<!DOCTYPE html>
<html lang="en">

<head>
	<title>{{ title }}</title>
	<link rel="shortcut icon" href="{{ url_for('static', filename='images/planting.ico') }}"/>

	<!-- Meta -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta charset="utf-8">

	<!-- CSS -->
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<link href="{{ url_for('static', filename='css/bootstrap.css') }}" rel='stylesheet' type='text/css' />
	<link href="{{ url_for('static', filename='css/style.css') }}" rel='stylesheet' type='text/css' />
	<link href="{{ url_for('static', filename='css/font-awesome.min.css') }}" rel='stylesheet'>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<!-- Google Fonts -->
	<link href="//fonts.googleapis.com/css2?family=Thasadith:400,400i,700,700i&amp;subset=latin-ext,thai,vietnamese&display=swap" rel="stylesheet">

	<style>
		html { font-size: 1rem; }
		@media (min-width: 576px) { html { font-size: 1.25rem; } }
		@media (min-width: 768px) { html { font-size: 1.1rem; } h1 { font-size: 1.3rem; } h2 { font-size: 1.2rem; } }
		@media (min-width: 992px) { html { font-size: 1.2rem; } h1 { font-size: 1.5rem; } h2 { font-size: 1.4rem; } }
		@media (min-width: 1200px) { html { font-size: 1.2rem; } h1 { font-size: 1.7rem; } h2 { font-size: 1.6rem; } }
		header { background-color: rgba(30, 30, 30, 1); margin-top: 0; display: block; }
	</style>

	<!-- JS (loaded once, at end of head for availability) -->
	<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
		integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
		crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
		integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
		crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
		integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
		crossorigin="anonymous"></script>

	<script type="text/JavaScript" src="{{ url_for('static', filename='scripts/cities.js') }}"></script>
</head>

<body>

	<!-- Navigation -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark static-top" style="background-color: #1b4d3e;">
		<div class="container">
			<a class="navbar-brand" href="{{ url_for('main.index') }}">
				<img src="{{ url_for('static', filename='images/kisan.jpg') }}" style="width: 90px; height: 55px" alt="KrishiSaar Logo">
			</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
				aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarResponsive">
				<div id="google_translate_element"></div>
				<ul class="navbar-nav ml-auto">
					<li class="nav-item active">
						<a class="nav-link" href="{{ url_for('main.index') }}">Home
							<span class="sr-only">(current)</span>
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('main.dashboard') }}">Dashboard</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('crop.crop_recommend') }}">Crop Recommendation</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('fertilizer.fertilizer_page') }}">Fertilizer</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('disease.disease_prediction') }}">Disease Detection</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('sms.sms_simulator') }}">SMS Simulator</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('expert.expert_portal') }}">Expert Connect</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	{% block body %} {% endblock %}

	<!-- Footer -->
	<footer class="text-center py-5" style="background-color: #113327; color: #fff;">
		<div class="container py-md-3">
			<h2 class="logo2 text-center">
				<a href="{{ url_for('main.index') }}" style="color: #2ecc71;">
					KrishiSaar AI
					<br><br>
					<b>#WeAreFarmers'Voice</b>
				</a>
			</h2>
			<div class="w3l-copy text-center mt-4">
				<p class="text-da">An Environmental Intelligence Initiative</p>
			</div>
		</div>
	</footer>

	<!-- Google Translate Script -->
	<script type="text/javascript">
		function googleTranslateElementInit() {
			new google.translate.TranslateElement({
				pageLanguage: 'en',
				includedLanguages: 'en,hi,mr,ta,te,kn,or,bn,gu,ml,pa,as,ur,sr,si,sd,ne,ks,ma,kd,bh,ho,kp,ra,co,ch,go,na,li,ga,md,mi,no,ve,so,ti,be,wa,di,me,bu,ri,mp,ci,ke,ji,bl,mo,ru',
				layout: google.translate.TranslateElement.InlineLayout.SIMPLE
			}, 'google_translate_element');
		}
	</script>
	<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>

</html>
